{% extends 'base.html' %}
{% block title %}Supprimer Étudiant{% endblock %}

{% block content %}

<h2>Supprimer Étudiant</h2>

<p>Êtes-vous sûr de vouloir supprimer cet étudiant ?</p>

<p><b>{{ etudiant.prenom }} {{ etudiant.nom }}</b></p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Supprimer</button>
    <a href="{% url 'liste_etudiants' %}" class="btn btn-secondary">Annuler</a>
</form>

{% endblock %}
